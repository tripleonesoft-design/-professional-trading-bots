<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="atrFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#9b59b6;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg3)" rx="10"/>

  <text x="400" y="25" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">ATR (Average True Range)</text>
  <text x="400" y="45" font-family="Arial, sans-serif" font-size="12" fill="#888888" text-anchor="middle">Period: 14 | Volatility Measurement</text>

  <rect x="60" y="70" width="700" height="200" fill="#0a0a15" rx="5"/>

  <line x1="90" y1="180" x2="90" y2="200" stroke="#ff6b6b" stroke-width="2"/>
  <rect x="80" y="190" width="20" height="10" fill="#ff6b6b"/>
  <line x1="130" y1="170" x2="130" y2="195" stroke="#00ff88" stroke-width="2"/>
  <rect x="120" y="175" width="20" height="15" fill="#00ff88"/>
  <line x1="170" y1="160" x2="170" y2="190" stroke="#00ff88" stroke-width="2"/>
  <rect x="160" y="165" width="20" height="20" fill="#00ff88"/>
  <line x1="210" y1="140" x2="210" y2="170" stroke="#ff6b6b" stroke-width="2"/>
  <rect x="200" y="145" width="20" height="20" fill="#ff6b6b"/>
  <line x1="250" y1="130" x2="250" y2="160" stroke="#00ff88" stroke-width="2"/>
  <rect x="240" y="135" width="20" height="20" fill="#00ff88"/>
  <line x1="290" y1="120" x2="290" y2="150" stroke="#00ff88" stroke-width="2"/>
  <rect x="280" y="125" width="20" height="20" fill="#00ff88"/>
  <line x1="330" y1="140" x2="330" y2="180" stroke="#ff6b6b" stroke-width="2"/>
  <rect x="320" y="145" width="20" height="10" fill="#ff6b6b"/>
  <line x1="370" y1="150" x2="370" y2="190" stroke="#ff6b6b" stroke-width="2"/>
  <rect x="360" y="155" width="20" height="10" fill="#ff6b6b"/>
  <line x1="410" y1="130" x2="410" y2="160" stroke="#00ff88" stroke-width="2"/>
  <rect x="400" y="135" width="20" height="20" fill="#00ff88"/>
  <line x1="450" y1="110" x2="450" y2="140" stroke="#00ff88" stroke-width="2"/>
  <rect x="440" y="115" width="20" height="20" fill="#00ff88"/>
  <line x1="490" y1="100" x2="490" y2="120" stroke="#00ff88" stroke-width="2"/>
  <rect x="480" y="105" width="20" height="10" fill="#00ff88"/>
  <line x1="530" y1="120" x2="530" y2="150" stroke="#ff6b6b" stroke-width="2"/>
  <rect x="520" y="125" width="20" height="10" fill="#ff6b6b"/>

  <rect x="60" y="285" width="700" height="100" fill="#0a0a15" rx="5"/>

  <polyline points="60,340 90,335 120,330 150,325 180,320 210,315 240,310 270,305 300,300 330,295 360,290 390,285 420,280 450,275 480,270 510,265 540,260 570,255 600,250 630,245 660,240 690,235 720,230 750,225 760,220"
            fill="none" stroke="#9b59b6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <polygon points="60,340 90,335 120,330 150,325 180,320 210,315 240,310 270,305 300,300 330,295 360,290 390,285 420,280 450,275 480,270 510,265 540,260 570,255 600,250 630,245 660,240 690,235 720,230 750,225 760,220 760,350 60,350"
           fill="url(#atrFill)"/>

  <circle cx="760" cy="220" r="6" fill="#9b59b6"/>
  <text x="760" y="205" font-family="Arial" font-size="14" fill="#9b59b6" text-anchor="middle" font-weight="bold">ATR: 0.0125</text>

  <text x="45" y="350" font-family="Arial" font-size="10" fill="#666" text-anchor="end">0</text>
  <text x="45" y="285" font-family="Arial" font-size="10" fill="#9b59b6" text-anchor="end" font-weight="bold">High</text>

  <rect x="720" y="215" width="70" height="30" rx="5" fill="#9b59b6" opacity="0.2"/>
  <text x="760" y="235" font-family="Arial" font-size="12" fill="#ffffff" text-anchor="middle">1.25 pips</text>

  <rect x="60" y="355" width="700" height="35" rx="5" fill="#222" opacity="0.5"/>
  <text x="80" y="375" font-family="Arial" font-size="11" fill="#ffffff" text-anchor="start">ATR measures market volatility</text>
  <text x="320" y="375" font-family="Arial" font-size="11" fill="#888888" text-anchor="middle">|</text>
  <text x="350" y="375" font-family="Arial" font-size="11" fill="#ffffff" text-anchor="start">High ATR = More movement (Trade)</text>
  <text x="600" y="375" font-family="Arial" font-size="11" fill="#888888" text-anchor="middle">|</text>
  <text x="630" y="375" font-family="Arial" font-size="11" fill="#ffffff" text-anchor="start">Low ATR = Low volatility (Wait)</text>
</svg>