<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg2)" rx="10"/>

  <text x="400" y="25" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">MACD (Moving Average Convergence Divergence)</text>
  <text x="400" y="45" font-family="Arial, sans-serif" font-size="12" fill="#888888" text-anchor="middle">Fast: 12 | Slow: 26 | Signal: 9</text>

  <line x1="60" y1="200" x2="760" y2="200" stroke="#444" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="50" y="205" font-family="Arial" font-size="10" fill="#666" text-anchor="end">0</text>

  <rect x="60" y="80" width="700" height="120" fill="#00ff88" opacity="0.05"/>
  <text x="400" y="100" font-family="Arial" font-size="10" fill="#00ff88" text-anchor="middle" opacity="0.6">BULLISH ZONE</text>

  <rect x="60" y="200" width="700" height="120" fill="#ff6b6b" opacity="0.05"/>
  <text x="400" y="340" font-family="Arial" font-size="10" fill="#ff6b6b" text-anchor="middle" opacity="0.6">BEARISH ZONE</text>

  <polyline points="60,220 100,200 140,210 180,190 220,170 260,150 300,140 340,160 380,180 420,160 460,140 500,130 540,150 580,170 620,150 660,130 700,140 740,120 760,110"
            fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <polyline points="60,230 100,225 140,220 180,215 220,205 260,195 300,190 340,185 380,180 420,175 460,170 500,165 540,160 580,155 620,150 660,145 700,140 740,135 760,130"
            fill="none" stroke="#ff9500" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="80" y="200" width="20" height="20" fill="#00ff88" opacity="0.7"/>
  <rect x="120" y="200" width="20" height="10" fill="#00ff88" opacity="0.7"/>
  <rect x="160" y="200" width="20" height="-10" fill="#ff6b6b" opacity="0.7"/>
  <rect x="200" y="200" width="20" height="-20" fill="#ff6b6b" opacity="0.7"/>
  <rect x="240" y="200" width="20" height="-30" fill="#ff6b6b" opacity="0.7"/>
  <rect x="280" y="200" width="20" height="-35" fill="#ff6b6b" opacity="0.7"/>
  <rect x="320" y="200" width="20" height="-25" fill="#00ff88" opacity="0.7"/>
  <rect x="360" y="200" width="20" height="-15" fill="#00ff88" opacity="0.7"/>
  <rect x="400" y="200" width="20" height="-20" fill="#ff6b6b" opacity="0.7"/>
  <rect x="440" y="200" width="20" height="-30" fill="#ff6b6b" opacity="0.7"/>
  <rect x="480" y="200" width="20" height="-35" fill="#ff6b6b" opacity="0.7"/>
  <rect x="520" y="200" width="20" height="-25" fill="#00ff88" opacity="0.7"/>
  <rect x="560" y="200" width="20" height="-15" fill="#00ff88" opacity="0.7"/>
  <rect x="600" y="200" width="20" height="-25" fill="#ff6b6b" opacity="0.7"/>
  <rect x="640" y="200" width="20" height="-35" fill="#ff6b6b" opacity="0.7"/>
  <rect x="680" y="200" width="20" height="-30" fill="#ff6b6b" opacity="0.7"/>
  <rect x="720" y="200" width="20" height="-35" fill="#ff6b6b" opacity="0.7"/>

  <rect x="60" y="355" width="700" height="35" rx="5" fill="#222" opacity="0.5"/>
  <line x1="80" y1="372" x2="100" y2="372" stroke="#00d4ff" stroke-width="3"/>
  <text x="105" y="375" font-family="Arial" font-size="11" fill="#00d4ff" text-anchor="start">MACD Line</text>

  <line x1="200" y1="372" x2="220" y2="372" stroke="#ff9500" stroke-width="3"/>
  <text x="225" y="375" font-family="Arial" font-size="11" fill="#ff9500" text-anchor="start">Signal Line</text>

  <rect x="320" y="365" width="12" height="12" fill="#00ff88" opacity="0.7"/>
  <text x="340" y="375" font-family="Arial" font-size="11" fill="#00ff88" text-anchor="start">Bullish Histogram</text>

  <rect x="470" y="365" width="12" height="12" fill="#ff6b6b" opacity="0.7"/>
  <text x="490" y="375" font-family="Arial" font-size="11" fill="#ff6b6b" text-anchor="start">Bearish Histogram</text>

  <text x="650" y="375" font-family="Arial" font-size="10" fill="#888888" text-anchor="start">Cross above 0 = Buy | Cross below 0 = Sell</text>
</svg>